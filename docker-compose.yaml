# llm-provider — contributor GPU stack (separate from llm-gateway)
services:
  ollama:
    image: ollama/ollama:latest
    container_name: llm-provider-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"

  provider-agent:
    build: .
    image: llm-provider-agent:local
    container_name: llm-provider-agent
    restart: unless-stopped
    depends_on:
      - ollama
    volumes:
      - provider-agent-data:/data
    environment:
      - GATEWAY_URL=${GATEWAY_URL:?Set GATEWAY_URL}
      - HANDSHAKE=${HANDSHAKE:-1}
      - INW_TOKEN=${INW_TOKEN:-}
      - OLLAMA_URL=http://ollama:11434
      - INFERENCE_LAN_URL=${INFERENCE_LAN_URL:-}
      - VRAM_GB=${VRAM_GB:-}
      - HEARTBEAT_S=${HEARTBEAT_S:-30}

volumes:
  ollama-data:
  provider-agent-data: